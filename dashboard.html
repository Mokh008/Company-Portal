<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>MK Nexus Enterprise</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root{
  --bg:#0b0f19;
  --card:#121826;
  --accent:#2dd4bf;
  --danger:#f87171;
  --warning:#facc15;
  --text:#f1f5f9;
  --muted:#94a3b8;
  --border:#1f2937;
}
.light{
  --bg:#f3f4f6;
  --card:#ffffff;
  --accent:#0ea5e9;
  --danger:#ef4444;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  transition:.3s;
}
.sidebar{
  width:230px;
  background:var(--card);
  padding:30px 20px;
  border-right:1px solid var(--border);
  min-height:100vh;
}
.logo{
  font-weight:600;
  font-size:18px;
  letter-spacing:2px;
  margin-bottom:40px;
}
.main{
  flex:1;
  padding:40px 60px;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}
.controls{display:flex;gap:10px;}
button{
  padding:6px 12px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  cursor:pointer;
}
button:hover{border-color:var(--accent);}
select,input[type="date"]{
  width:100%;
  padding:6px;
  border-radius:8px;
  background:var(--card);
  color:var(--text);
  border:1px solid var(--border);
}
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
  margin-bottom:50px;
}
.project-card{
  background:linear-gradient(145deg,#121826,#0f1524);
  padding:40px;
  border-radius:24px;
  border:1px solid var(--border);
  text-align:center;
  cursor:pointer;
  transition:.35s ease;
}
.project-card:hover{
  transform:translateY(-8px) scale(1.03);
  border:1px solid var(--accent);
  box-shadow:0 25px 60px rgba(45,212,191,.35);
}
.kpis{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-bottom:40px;
}
.kpi-card{
  background:var(--card);
  padding:22px;
  border-radius:18px;
  border:1px solid var(--border);
}
.kpi-title{font-size:13px;color:var(--muted);}
.kpi-value{font-size:24px;margin-top:8px;font-weight:600;}
.section-title{margin:40px 0 15px;}
.charts{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
  gap:30px;
}
.chart-card{
  background:var(--card);
  padding:25px;
  border-radius:18px;
  border:1px solid var(--border);
}
table{width:100%;border-collapse:collapse;}
th,td{padding:6px;border-bottom:1px solid var(--border);font-size:13px;}
.rank1{color:#facc15;font-weight:bold;}
.rank2{color:#cbd5e1;}
.rank3{color:#f87171;}
.top5-row{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-bottom:20px;
}
.loader-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:none;justify-content:center;align-items:center;z-index:2000;
}
.spinner{
  width:70px;height:70px;border:6px solid rgba(255,255,255,.3);
  border-top:6px solid var(--accent);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">MK NEXUS</div>
</div>

<div class="main" id="dashboardContent">

  <div class="header">
    <div id="userInfo"></div>
    <div class="controls">
      <button onclick="toggleTheme()">Theme</button>
      <button onclick="exportPDF()">PDF</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- ===== ADMIN FILTERS ===== -->
  <div class="kpis">

    <div class="kpi-card">
      <div class="kpi-title">Month (Administrative)</div>
      <select id="monthFilter" onchange="loadAdminData()"></select>
    </div>

    <!-- Sector filter: Admin only -->
    <div class="kpi-card" id="adminSectorCard" style="display:none;">
      <div class="kpi-title">Sector (Administrative)</div>
      <select id="adminSectorFilter" onchange="loadAdminData()">
        <option value="">All</option>
        <option value="Traditional">Traditional</option>
        <option value="Mechanical">Mechanical</option>
      </select>
    </div>

  </div>

  <!-- Projects shortcuts -->
  <div id="projectsSection" class="projects"></div>

  <!-- KPI cards -->
  <div id="kpiSection" class="kpis"></div>

  <!-- ===== ADMIN CHARTS ===== -->
  <h3 class="section-title">Administrative Charts</h3>
  <div id="adminCharts" class="charts">

    <div class="chart-card">
      <h3>Rent vs Expenses</h3>
      <canvas id="adminRentChart"></canvas>
    </div>

    <!-- Employee chart: admin & sector_manager only -->
    <div class="chart-card" id="adminEmployeeCard">
      <h3>Employee Activity</h3>
      <canvas id="adminEmployeeChart"></canvas>
    </div>

  </div>

  <!-- ===== SUPPLY SECTION ===== -->
  <h2 class="section-title">Supply Performance</h2>

  <div class="kpis">

    <div class="kpi-card">
      <div class="kpi-title">Select Date (Supply)</div>
      <input type="date"
             id="supplyDateFilter"
             onchange="loadSupplyData()"
             onkeydown="return false"
             onpaste="return false">
    </div>

    <!-- Sector filter: Admin only -->
    <div class="kpi-card" id="supplySectorCard" style="display:none;">
      <div class="kpi-title">Sector (Supply)</div>
      <select id="sectorFilter" onchange="loadSupplyData()">
        <option value="">All</option>
        <option value="Traditional">Traditional</option>
        <option value="Mechanical">Mechanical</option>
      </select>
    </div>

  </div>

  <div id="supplyKPIs" class="kpis"></div>

  <!-- Top 5 tables -->
  <div id="top5Section"></div>

  <!-- ===== SUPPLY CHARTS ===== -->
  <h3 class="section-title">Supply Charts</h3>
  <div id="supplyCharts" class="charts">

    <div class="chart-card">
      <h3>Plan vs Actual</h3>
      <canvas id="supplyPlanChart"></canvas>
    </div>

    <div class="chart-card">
      <h3>Sugar %</h3>
      <canvas id="supplySugarChart"></canvas>
    </div>

    <div class="chart-card">
      <h3>Tare %</h3>
      <canvas id="supplyTareChart"></canvas>
    </div>

  </div>

</div><!-- end .main -->

<div id="loaderOverlay" class="loader-overlay">
  <div class="spinner"></div>
</div>

<script>
// =====================================================
// ================= BOOTSTRAP =========================
// =====================================================

const API_URL = "https://script.google.com/macros/s/AKfycbwKFQNj6izqkZm93EMt1NTPMhCsAyfcctyuiv6okLORMEv2SmXApo64zronsl31ZLEa/exec";

const user = JSON.parse(localStorage.getItem("user"));
if (!user) window.location.href = "index.html";

// =====================================================
// ================= ROLE FLAGS ========================
// =====================================================

const role        = String(user.role || "").toLowerCase();
const isAdmin     = role === "admin";
const isSectorMgr = role === "sector_manager";
const isManager   = role === "manager";
const isEngineer  = role === "engineer";

// =====================================================
// ================= CHART INSTANCES ===================
// =====================================================

let adminRentChart     = null;
let adminEmployeeChart = null;
let supplyPlanChart    = null;
let supplySugarChart   = null;
let supplyTareChart    = null;

// =====================================================
// ================= IN-FLIGHT REQUEST CONTROL =========
// =====================================================

// Prevents stale responses from overwriting newer ones
let _adminReqId  = 0;
let _supplyReqId = 0;

// =====================================================
// ================= UI HELPERS ========================
// =====================================================

function currency(n) { return new Intl.NumberFormat().format(n || 0); }

let _loaderCount = 0;
function showLoader() { _loaderCount++; document.getElementById("loaderOverlay").style.display = "flex"; }
function hideLoader() { _loaderCount = Math.max(0, _loaderCount - 1); if (!_loaderCount) document.getElementById("loaderOverlay").style.display = "none"; }

function toggleTheme() { document.body.classList.toggle("light"); }
function logout()      { localStorage.removeItem("user"); window.location.href = "index.html"; }
function exportPDF()   { html2pdf().from(document.getElementById("dashboardContent")).save("MK_Nexus_Report.pdf"); }

function getProfessionalOptions() {
  return { responsive: true, maintainAspectRatio: true, aspectRatio: 2 };
}

// =====================================================
// ================= INIT ==============================
// =====================================================

window.addEventListener("DOMContentLoaded", function () {

  document.getElementById("userInfo").innerText =
    user.name + " • " + user.role + (user.sector ? " • " + user.sector : "");

  // Admin-only UI
  if (isAdmin) {
    document.getElementById("adminSectorCard").style.display  = "";
    document.getElementById("supplySectorCard").style.display = "";
  }

  // Hide employee chart for plain managers and engineers
  if (isManager || isEngineer) {
    document.getElementById("adminEmployeeCard").style.display = "none";
  }

  renderProjects();
  buildAdminMonthFilter();

  // Run both requests in parallel on load
  setTimeout(() => {
    loadAdminData();
    loadSupplyData();
  }, 100);

  // Supply date default = today
  const dateInput = document.getElementById("supplyDateFilter");
  if (!dateInput.value) {
    dateInput.value = new Date().toISOString().split("T")[0];
  }

  // Auto-refresh supply every 60s
  setInterval(() => loadSupplyData(), 60000);
});

// =====================================================
// ================= PROJECTS ==========================
// =====================================================

function renderProjects() {
  const p = document.getElementById("projectsSection");
  p.innerHTML = "";

  function add(title, link) {
    const d = document.createElement("div");
    d.className = "project-card";
    d.innerHTML = "<h3>" + title + "</h3>";
    d.onclick = () => window.open(link, "_blank");
    p.appendChild(d);
  }

  add("Attendance", "https://mokh008.github.io/Attendance-Login/");
  add("Expenses",   "https://mokh008.github.io/Expenses-System/");
  add("Rentals",    "https://mokh008.github.io/Rent-Payment-UI/");
}

// =====================================================
// ================= MONTH FILTER ======================
// =====================================================

function buildAdminMonthFilter() {
  const select = document.getElementById("monthFilter");
  if (!select) return;
  select.innerHTML = "";

  const allOpt = document.createElement("option");
  allOpt.value = "";
  allOpt.textContent = "All";
  select.appendChild(allOpt);

  const now = new Date();

  for (let i = 0; i < 18; i++) {
    const d     = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const month = String(d.getMonth() + 1).padStart(2, "0");
    const year  = d.getFullYear();
    const opt   = document.createElement("option");
    opt.value   = month + "-" + year;
    opt.textContent = d.toLocaleString("default", { month: "long" }) + " " + year;
    select.appendChild(opt);
  }

  select.value = String(now.getMonth() + 1).padStart(2, "0") + "-" + now.getFullYear();
}

// =====================================================
// ================= LOAD ADMIN DATA ===================
// =====================================================

function loadAdminData() {
  const reqId = ++_adminReqId;
  showLoader();

  const month  = document.getElementById("monthFilter")?.value || "";
  // Sector filter: only sent for admin; backend ignores it for others
  const sector = isAdmin
    ? (document.getElementById("adminSectorFilter")?.value || "")
    : "";

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action:  "adminAnalytics",
      user:    user,
      filters: { month, sector }
    })
  })
  .then(res => res.json())
  .then(data => {
    // Discard stale responses
    if (reqId !== _adminReqId) return;
    if (!data || data.success === false) throw new Error(data?.error || "Admin API error");

    if (data.kpis)        renderKPIs(data.kpis);
    if (data.adminCharts) renderAdminCharts(data.adminCharts);

    hideLoader();
  })
  .catch(err => {
    if (reqId !== _adminReqId) return;
    hideLoader();
    console.error("Admin error:", err.message);
  });
}

// =====================================================
// ================= RENDER KPIs =======================
// =====================================================

function renderKPIs(k) {
  let html = `
    <div class="kpi-card">
      <div class="kpi-title">Total Rent</div>
      <div class="kpi-value">${currency(k.totalRent)}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-title">Total Expenses</div>
      <div class="kpi-value">${currency(k.totalExpenses)}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-title">Operating Cost</div>
      <div class="kpi-value">${currency(k.monthlyOperatingCost)}</div>
    </div>
  `;

  if (isAdmin && k.custody) {
    html += `
      <div class="kpi-card">
        <div class="kpi-title">Custody Balance</div>
        <div class="kpi-value">${currency(k.custody.currentBalance)}</div>
      </div>
    `;
  }

  document.getElementById("kpiSection").innerHTML = html;
}

// =====================================================
// ================= RENDER ADMIN CHARTS ===============
// =====================================================

function renderAdminCharts(data) {
  if (!data) return;

  if (adminRentChart     instanceof Chart) adminRentChart.destroy();
  if (adminEmployeeChart instanceof Chart) adminEmployeeChart.destroy();

  adminRentChart = new Chart(
    document.getElementById("adminRentChart"),
    {
      type: "bar",
      data: {
        labels: ["Rent", "Expenses"],
        datasets: [{ label: "Amount", data: [data.rent || 0, data.expenses || 0], borderRadius: 12 }]
      },
      options: getProfessionalOptions()
    }
  );

  if (isAdmin || isSectorMgr) {
    adminEmployeeChart = new Chart(
      document.getElementById("adminEmployeeChart"),
      {
        type: "bar",
        data: {
          labels: (data.employees || []).map(e => e.name),
          datasets: [{ label: "Attendance", data: (data.employees || []).map(e => e.count), borderRadius: 10 }]
        },
        options: getProfessionalOptions()
      }
    );
  }
}

// =====================================================
// ================= LOAD SUPPLY DATA ==================
// =====================================================

function loadSupplyData() {
  const reqId = ++_supplyReqId;
  showLoader();

  const dateInput = document.getElementById("supplyDateFilter");
  const date      = dateInput?.value || "";

  // Sector filter sent only for admin; backend enforces sector for others
  const sector = isAdmin
    ? (document.getElementById("sectorFilter")?.value || "")
    : "";

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action:  "supplyAnalytics",
      user:    user,
      filters: { date, sector }
    })
  })
  .then(res => res.json())
  .then(data => {
    if (reqId !== _supplyReqId) return;
    if (!data || data.success === false) throw new Error(data?.error || "Supply API error");

    // Sync date picker if backend chose a date automatically
    if (!date && data.supplySummary?.selectedDate) {
      dateInput.value = data.supplySummary.selectedDate;
    }

    if (data.supplySummary) {
      renderSupplyKPIs(data.supplySummary);
      renderSupplyCharts(data.supplySummary);
    }

    if (data.supplyTop5) renderTop5(data.supplyTop5);

    hideLoader();
  })
  .catch(err => {
    if (reqId !== _supplyReqId) return;
    hideLoader();
    console.error("Supply error:", err.message);
  });
}

// =====================================================
// ================= RENDER SUPPLY KPIs ================
// =====================================================

function renderSupplyKPIs(data) {
  if (!data || !data.today || !data.toDate) return;

  const today  = data.today;
  const toDate = data.toDate;

  const achToday  = today.totalQuota  ? ((today.totalDelivered  / today.totalQuota)  * 100).toFixed(1) : "0.0";
  const achToDate = toDate.totalQuota ? ((toDate.totalDelivered / toDate.totalQuota) * 100).toFixed(1) : "0.0";

  document.getElementById("supplyKPIs").innerHTML = `
    <div class="kpi-card"><div class="kpi-title">Quota (Today)</div><div class="kpi-value">${today.totalQuota || 0}</div></div>
    <div class="kpi-card">
      <div class="kpi-title">Delivered (Today)</div>
      <div class="kpi-value">${today.totalDelivered || 0}<div style="font-size:13px;color:var(--muted);margin-top:6px;">Net: ${today.totalNet || 0}</div></div>
    </div>
    <div class="kpi-card"><div class="kpi-title">Achievement % (Today)</div><div class="kpi-value">${achToday}%</div></div>
    <div class="kpi-card"><div class="kpi-title">Avg Sugar (Today)</div><div class="kpi-value">${(today.avgSugar || 0).toFixed(2)}%</div></div>
    <div class="kpi-card"><div class="kpi-title">Avg Tare (Today)</div><div class="kpi-value">${(today.avgTare || 0).toFixed(2)}%</div></div>

    <div class="kpi-card"><div class="kpi-title">Quota (To Date)</div><div class="kpi-value">${toDate.totalQuota || 0}</div></div>
    <div class="kpi-card">
      <div class="kpi-title">Delivered (To Date)</div>
      <div class="kpi-value">${toDate.totalDelivered || 0}<div style="font-size:13px;color:var(--muted);margin-top:6px;">Net: ${toDate.totalNet || 0}</div></div>
    </div>
    <div class="kpi-card"><div class="kpi-title">Achievement % (To Date)</div><div class="kpi-value">${achToDate}%</div></div>
    <div class="kpi-card"><div class="kpi-title">Avg Sugar (To Date)</div><div class="kpi-value">${(toDate.avgSugar || 0).toFixed(2)}%</div></div>
    <div class="kpi-card"><div class="kpi-title">Avg Tare (To Date)</div><div class="kpi-value">${(toDate.avgTare || 0).toFixed(2)}%</div></div>
  `;
}

// =====================================================
// ================= RENDER TOP 5 ======================
// =====================================================

function renderTop5(data) {
  if (!data || !data.today || !data.toDate) return;

  function buildCard(title, rows, field) {
    if (!rows || !rows.length) return "";
    let html = `<div class="kpi-card"><h4>${title}</h4><table>`;
    rows.forEach((r, i) => {
      const cls = i === 0 ? "rank1" : i === 1 ? "rank2" : i === 2 ? "rank3" : "";
      html += `<tr class="${cls}"><td>${i + 1}. ${r.engineer}</td><td>${(r[field] || 0).toFixed(2)}</td></tr>`;
    });
    html += "</table></div>";
    return html;
  }

  document.getElementById("top5Section").innerHTML = `
    <h3 class="section-title">Top 5 — Today</h3>
    <div class="top5-row">
      ${buildCard("Top 5 Ton (Today)",   data.today.topTons,  "tons")}
      ${buildCard("Top 5 Sugar (Today)", data.today.topSugar, "sugar")}
      ${buildCard("Top 5 Tare (Today)",  data.today.topTare,  "tare")}
    </div>
    <h3 class="section-title">Top 5 — To Date</h3>
    <div class="top5-row">
      ${buildCard("Top 5 Ton (To Date)",   data.toDate.topTons,  "tons")}
      ${buildCard("Top 5 Sugar (To Date)", data.toDate.topSugar, "sugar")}
      ${buildCard("Top 5 Tare (To Date)",  data.toDate.topTare,  "tare")}
    </div>
  `;
}

// =====================================================
// ================= RENDER SUPPLY CHARTS ==============
// =====================================================

function renderSupplyCharts(summary) {
  if (!summary) return;

  const today     = summary.today;
  const quota     = today.totalQuota     || 0;
  const delivered = today.totalDelivered || 0;
  const sugar     = today.avgSugar       || 0;
  const tare      = today.avgTare        || 0;

  if (supplyPlanChart  instanceof Chart) supplyPlanChart.destroy();
  if (supplySugarChart instanceof Chart) supplySugarChart.destroy();
  if (supplyTareChart  instanceof Chart) supplyTareChart.destroy();

  supplyPlanChart = new Chart(
    document.getElementById("supplyPlanChart"),
    {
      type: "bar",
      data: {
        labels: ["Today"],
        datasets: [
          { label: "Quota",     data: [quota],     borderRadius: 10 },
          { label: "Delivered", data: [delivered], borderRadius: 10 }
        ]
      },
      options: getProfessionalOptions()
    }
  );

  supplySugarChart = new Chart(
    document.getElementById("supplySugarChart"),
    {
      type: "line",
      data: { labels: ["Today"], datasets: [{ label: "Sugar %", data: [sugar], tension: .4, fill: true }] },
      options: getProfessionalOptions()
    }
  );

  supplyTareChart = new Chart(
    document.getElementById("supplyTareChart"),
    {
      type: "line",
      data: { labels: ["Today"], datasets: [{ label: "Tare %", data: [tare], tension: .4, fill: true }] },
      options: getProfessionalOptions()
    }
  );
}
</script>
</body>
</html>
