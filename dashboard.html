<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>MK Nexus Enterprise</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root{
  --bg:#0b0f19;
  --card:#121826;
  --accent:#2dd4bf;
  --danger:#f87171;
  --warning:#facc15;
  --text:#f1f5f9;
  --muted:#94a3b8;
  --border:#1f2937;
}
.light{
  --bg:#f3f4f6;
  --card:#ffffff;
  --accent:#0ea5e9;
  --danger:#ef4444;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  transition:.3s;
}
.sidebar{
  width:230px;
  background:var(--card);
  padding:30px 20px;
  border-right:1px solid var(--border);
  min-height:100vh;
}
.logo{
  font-weight:600;
  font-size:18px;
  letter-spacing:2px;
  margin-bottom:40px;
}
.main{
  flex:1;
  padding:40px 60px;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}
.controls{display:flex;gap:10px;}
button{
  padding:6px 12px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  cursor:pointer;
}
button:hover{border-color:var(--accent);}
select{
  width:100%;
  padding:6px;
  border-radius:8px;
  background:var(--card);
  color:var(--text);
  border:1px solid var(--border);
}
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
  margin-bottom:50px;
}
.project-card{
  background:linear-gradient(145deg,#121826,#0f1524);
  padding:40px;
  border-radius:24px;
  border:1px solid var(--border);
  text-align:center;
  cursor:pointer;
  transition:.35s ease;
}
.project-card:hover{
  transform:translateY(-8px) scale(1.03);
  border:1px solid var(--accent);
  box-shadow:0 25px 60px rgba(45,212,191,.35);
}
.kpis{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-bottom:40px;
}
.kpi-card{
  background:var(--card);
  padding:22px;
  border-radius:18px;
  border:1px solid var(--border);
}
.kpi-title{font-size:13px;color:var(--muted);}
.kpi-value{font-size:24px;margin-top:8px;font-weight:600;}
.section-title{margin:40px 0 15px;}
.tabs{display:flex;gap:10px;margin-bottom:20px;}
.tab-btn{
  padding:8px 16px;
  border-radius:10px;
  border:1px solid var(--border);
  cursor:pointer;
}
.tab-btn.active{border-color:var(--accent);}
.charts{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
  gap:30px;
}
.chart-card{
  background:var(--card);
  padding:25px;
  border-radius:18px;
  border:1px solid var(--border);
}
table{width:100%;border-collapse:collapse;}
th,td{padding:6px;border-bottom:1px solid var(--border);font-size:13px;}
.rank1{color:#facc15;font-weight:bold;}
.rank2{color:#cbd5e1;}
.rank3{color:#f87171;}
.loader-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:none;justify-content:center;align-items:center;z-index:2000;
}
.spinner{
  width:70px;height:70px;border:6px solid rgba(255,255,255,.3);
  border-top:6px solid var(--accent);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">MK NEXUS</div>
</div>

<div class="main" id="dashboardContent">

<div class="header">
  <div id="userInfo"></div>
  <div class="controls">
    <button onclick="toggleTheme()">Theme</button>
    <button onclick="exportPDF()">PDF</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- FILTERS -->
<div class="kpis">
  <div class="kpi-card">
    <div class="kpi-title">Month</div>
    <select id="monthFilter" onchange="loadData()">
      <option value="">All</option>
      <option value="1">Jan</option>
      <option value="2">Feb</option>
      <option value="3">Mar</option>
      <option value="4">Apr</option>
      <option value="5">May</option>
      <option value="6">Jun</option>
      <option value="7">Jul</option>
      <option value="8">Aug</option>
      <option value="9">Sep</option>
      <option value="10">Oct</option>
      <option value="11">Nov</option>
      <option value="12">Dec</option>
    </select>
  </div>
  <div class="kpi-card">
    <div class="kpi-title">Sector</div>
    <select id="sectorFilter" onchange="loadData()">
      <option value="">All</option>
      <option value="Traditional">Traditional</option>
      <option value="Mechanical">Mechanical</option>
    </select>
  </div>
</div>

<div id="projectsSection" class="projects"></div>
<div id="kpiSection" class="kpis"></div>
<div id="custodySection"></div>

<h2 class="section-title">Supply Performance</h2>

<div class="tabs">
  <div class="tab-btn active" onclick="switchTab('today',event)">Today</div>
  <div class="tab-btn" onclick="switchTab('toDate',event)">To Date</div>
</div>

<div id="supplyKPIs" class="kpis"></div>
<div id="top5Section" class="kpis"></div>

<h3 class="section-title">Sector Comparison (Admin Only)</h3>
<div id="sectorSection" class="charts"></div>

<div class="charts">
  <div class="chart-card"><h3>Rent vs Expenses</h3><canvas id="rentChart"></canvas></div>
  <div class="chart-card"><h3>Employee Activity</h3><canvas id="employeeChart"></canvas></div>
  <div class="chart-card"><h3>Plan vs Actual</h3><canvas id="supplyChart"></canvas></div>
  <div class="chart-card"><h3>Sugar %</h3><canvas id="sugarChart"></canvas></div>
  <div class="chart-card"><h3>Tare %</h3><canvas id="tareChart"></canvas></div>
</div>

</div>

<div id="loaderOverlay" class="loader-overlay">
<div class="spinner"></div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxfO1hDPEZpFRyI2V052j4TTic82a5PQm7SsoKV1P5QK81JxKC9uE64U1vS4LhE3fxa/exec";
const user=JSON.parse(localStorage.getItem("user"));
if(!user) window.location.href="index.html";

document.getElementById("userInfo").innerText =
user.name+" • "+user.role+" • "+(user.sector||"");

let currentTab="today";
let rentChart,employeeChart,supplyChart,sugarChart,tareChart;
let sectorCharts=[];

function currency(n){return new Intl.NumberFormat().format(n||0);}
function showLoader(){document.getElementById("loaderOverlay").style.display="flex";}
function hideLoader(){document.getElementById("loaderOverlay").style.display="none";}

function switchTab(tab,e){
  currentTab=tab;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
  loadData();
}

function loadData(){

  showLoader();

  const month = document.getElementById("monthFilter").value;
  const sector = document.getElementById("sectorFilter").value;

  fetch(API_URL,{
  method:"POST",
  body: JSON.stringify({
    action:"analytics",
    user:user,
    filters:{ month, sector }
  })
})
  .then(res => {
    if(!res.ok){
      throw new Error("Network response was not ok");
    }
    return res.json();
  })
  .then(data => {

    console.log("API Response:", data); // مهم عشان تشوف بيرجع ايه

    if(!data || data.success === false){
      throw new Error(data?.error || "Invalid API response");
    }

    renderProjects();

    if(data.kpis)
      renderKPIs(data.kpis);

    if(data.custody)
      renderCustody(data.custody);

    if(data.supplySummary)
      renderSupply(data.supplySummary[currentTab]);

    if(data.supplyTop5)
      renderTop5(data.supplyTop5[currentTab]);

    if(data.sectorComparison)
      renderSector(data.sectorComparison);

    if(data.rentVsExpensesTrend)
      renderCharts(data);

    hideLoader();
  })
  .catch(err=>{
    console.error("Fetch Error:", err);
    hideLoader();
    alert("Connection error: " + err.message);
  });
}
function renderProjects(){
  const p=document.getElementById("projectsSection");
  p.innerHTML="";
  function add(title,link){
    const d=document.createElement("div");
    d.className="project-card";
    d.innerHTML="<h3>"+title+"</h3>";
    d.onclick=()=>window.open(link,"_blank");
    p.appendChild(d);
  }
  add("Attendance","https://mokh008.github.io/Attendance-Login/");
  add("Expenses","https://mokh008.github.io/Expenses-System/");
  add("Rentals","https://mokh008.github.io/Rent-Payment-UI/");
}

function renderKPIs(k){
  document.getElementById("kpiSection").innerHTML=
  '<div class="kpi-card"><div class="kpi-title">Total Rent</div><div class="kpi-value">'+currency(k.totalRent)+'</div></div>'+
  '<div class="kpi-card"><div class="kpi-title">Total Expenses</div><div class="kpi-value">'+currency(k.totalExpenses)+'</div></div>'+
  '<div class="kpi-card"><div class="kpi-title">Operating (Month)</div><div class="kpi-value">'+currency(k.monthlyOperatingCost)+'</div></div>';
}

function renderCustody(c){
  document.getElementById("custodySection").innerHTML=
  '<div class="kpis"><div class="kpi-card"><div class="kpi-title">Custody Balance</div><div class="kpi-value">'+currency(c.currentBalance)+'</div></div></div>';
}

function renderSupply(s){
  const ach=s.totalQuota?((s.totalDelivered/s.totalQuota)*100).toFixed(1):0;
  document.getElementById("supplyKPIs").innerHTML=
  '<div class="kpi-card"><div class="kpi-title">Quota</div><div class="kpi-value">'+s.totalQuota+'</div></div>'+
  '<div class="kpi-card"><div class="kpi-title">Delivered</div><div class="kpi-value">'+s.totalDelivered+'</div></div>'+
  '<div class="kpi-card"><div class="kpi-title">Achievement %</div><div class="kpi-value">'+ach+'%</div></div>'+
  '<div class="kpi-card"><div class="kpi-title">Avg Sugar</div><div class="kpi-value">'+s.avgSugar.toFixed(2)+'%</div></div>'+
  '<div class="kpi-card"><div class="kpi-title">Avg Tare</div><div class="kpi-value">'+s.avgTare.toFixed(2)+'%</div></div>';
}

function renderTop5(d){
  let html="";
  function table(title,rows,field){
    let t='<div class="kpi-card"><h4>'+title+'</h4><table>';
    rows.forEach((r,i)=>{
      let cls=i===0?"rank1":i===1?"rank2":i===2?"rank3":"";
      t+='<tr class="'+cls+'"><td>'+(i+1)+'. '+r.engineer+'</td><td>'+r[field].toFixed(2)+'</td></tr>';
    });
    t+='</table></div>';
    return t;
  }
  html+=table("Top 5 Ton",d.topTons,"tons");
  html+=table("Top 5 Sugar",d.topSugar,"sugar");
  html+=table("Top 5 Tare (Lowest)",d.topTare,"tare");
  document.getElementById("top5Section").innerHTML=html;
}

function renderSector(sec){
  if(user.role!=="admin") return;
}

function renderCharts(data){}

function toggleTheme(){document.body.classList.toggle("light");}
function logout(){localStorage.removeItem("user");window.location.href="index.html";}
function exportPDF(){html2pdf().from(document.getElementById("dashboardContent")).save("MK_Nexus_Report.pdf");}

loadData();
setInterval(loadData,60000);
</script>

</body>
</html>
