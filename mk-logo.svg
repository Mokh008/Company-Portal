<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Main gradient -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2dd4bf"/>
      <stop offset="50%"  stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>

    <!-- Inner glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(45,212,191,0.4)"/>
    </filter>

    <!-- Clip to hexagon -->
    <clipPath id="hexClip">
      <polygon points="60,6 108,33 108,87 60,114 12,87 12,33"/>
    </clipPath>
  </defs>

  <!-- Outer hexagon ring -->
  <polygon
    points="60,4 110,32 110,88 60,116 10,88 10,32"
    fill="none"
    stroke="url(#g1)"
    stroke-width="2"
    opacity="0.6"
    filter="url(#glow)"
  />

  <!-- Inner hexagon fill -->
  <polygon
    points="60,14 100,36 100,84 60,106 20,84 20,36"
    fill="rgba(13,20,40,0.9)"
    stroke="url(#g1)"
    stroke-width="1"
    opacity="0.8"
  />

  <!-- ── M letter ── -->
  <g filter="url(#shadow)">
    <!-- M left leg -->
    <rect x="28" y="42" width="7" height="36" rx="2" fill="url(#g1)"/>
    <!-- M right leg -->
    <rect x="56" y="42" width="7" height="36" rx="2" fill="url(#g1)"/>
    <!-- M left diagonal -->
    <polygon points="28,42 35,42 46.5,62 35,62" fill="url(#g1)"/>
    <!-- M right diagonal -->
    <polygon points="56,42 63,42 52,62 41,62" fill="url(#g1)"/>
  </g>

  <!-- ── K letter ── -->
  <g filter="url(#shadow)">
    <!-- K vertical bar -->
    <rect x="70" y="42" width="7" height="36" rx="2" fill="url(#g1)"/>
    <!-- K top arm -->
    <polygon points="77,42 85,42 77,60 70,60" fill="url(#g1)"/>
    <!-- K bottom arm -->
    <polygon points="77,78 85,78 77,60 70,60" fill="url(#g1)"/>
  </g>

  <!-- Corner accent dots -->
  <circle cx="60" cy="8"   r="3" fill="url(#g1)" opacity="0.7"/>
  <circle cx="60" cy="112" r="3" fill="url(#g1)" opacity="0.7"/>
  <circle cx="11" cy="33"  r="3" fill="url(#g1)" opacity="0.5"/>
  <circle cx="109" cy="33" r="3" fill="url(#g1)" opacity="0.5"/>
  <circle cx="11" cy="87"  r="3" fill="url(#g1)" opacity="0.5"/>
  <circle cx="109" cy="87" r="3" fill="url(#g1)" opacity="0.5"/>
</svg>
