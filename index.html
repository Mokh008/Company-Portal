<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>MK Nexus Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
  <div class="login-box">
    <h2>MK Nexus Portal</h2>
    <input type="email" id="email" placeholder="Email" autocomplete="username">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <button id="loginBtn" onclick="login()">Login</button>
  </div>
</div>

<!-- ===== LOADER ===== -->
<div id="loader" class="loader-overlay">
  <div class="spinner"></div>
</div>

<!-- ===== WELCOME SCREEN ===== -->
<div id="welcomeScreen" class="welcome-overlay">
  <div class="welcome-content">
    <img src="assets/icons/mk-nexus.png" class="welcome-logo">
    <h1>Welcome to MK Nexus</h1>
    <p id="welcomeUser"></p>
  </div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxN5Axs-cvHWj-HV_UrfCYa3z60ppP90y3V9RnYDzaHvw9X64PpgSUfHlqy9prOv4Gs/exec";

const loader = document.getElementById("loader");
const loginBtn = document.getElementById("loginBtn");

/* ============================= */
/* ===== Auto Clear Session ==== */
/* ============================= */
try {
  const existingUser = JSON.parse(localStorage.getItem("user"));
  if(existingUser && !existingUser.role){
    localStorage.removeItem("user");
  }
} catch(e){
  localStorage.removeItem("user");
}

/* ============================= */
/* ===== Enter Key Login ======= */
/* ============================= */
document.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    login();
  }
});

/* ============================= */
/* ===== LOGIN FUNCTION ======== */
/* ============================= */
async function login(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    alert("Please enter email and password");
    return;
  }

  loginBtn.disabled = true;
  loader.style.display = "flex";

  try{

    const response = await fetch(API_URL,{
  method:"POST",
  headers:{
    "Content-Type":"text/plain;charset=utf-8"
  },
  body:JSON.stringify({
    action:"login",
    email:email,
    password:password
  })
});
    if(!response.ok){
      throw new Error("Server error");
    }

    const result = await response.json();

    loader.style.display = "none";
    loginBtn.disabled = false;

    if(result.success && result.user){

      // ===== Data Hardening =====
      if(!result.user.role){
        alert("User role not defined");
        return;
      }

      if(!result.user.sector){
        result.user.sector = "";
      }

      localStorage.setItem("user", JSON.stringify(result.user));
      showWelcomeScreen(result.user.name);

    }else{
      alert("Invalid credentials");
    }

  }catch(error){

    loader.style.display = "none";
    loginBtn.disabled = false;
    alert("Connection error. Please try again.");

  }
}

/* ============================= */
/* ===== Welcome Animation ===== */
/* ============================= */
function showWelcomeScreen(name){

  const screen = document.getElementById("welcomeScreen");

  document.getElementById("welcomeUser").innerText =
    `Hello ${name}`;

  screen.style.display = "flex";

  setTimeout(()=>{
    window.location.href = "dashboard.html";
  },1500);
}

</script>

</body>
</html>
